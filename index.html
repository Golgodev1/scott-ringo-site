<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scott Ringo — Sound Design / Music Production</title>
  <meta name="description" content="Sound portfolio for Scott Ringo">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="light">
  <div class="app-shell">
    <header class="site-header">
      <div class="top-row">
        <div class="site-name">SCOTT RINGO</div>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
          <span class="theme-toggle__label">DARK MODE</span>
        </button>
      </div>
      <div class="rule"></div>
      <h1 class="hero">SOUND DESIGN / MUSIC PRODUCTION</h1>
      <div class="rule"></div>
    </header>

    <main class="main-grid">
      <aside class="sidebar">
        <nav class="nav">
          <button class="nav-link" data-view="about">ABOUT</button>
          <button class="nav-link" data-view="contact">CONTACT</button>
        </nav>
      </aside>

      <section class="content-column">
        <div class="content-stage">
          <div class="content-stage__inner is-visible" id="contentStage">
            <div class="stage-kicker" id="stageKicker">SELECTED WORK</div>
            <h2 class="stage-title" id="stageTitle">LOADING</h2>
            <div class="stage-meta" id="stageMeta" style="display:none;">
              <span id="stageRole"></span>
              <span id="stageMetaSep">•</span>
              <span id="stageYear"></span>
            </div>
            <p class="stage-copy" id="stageCopy">Loading content…</p>
            <button class="load-button" id="loadTrackBtn" style="display:none;">LOAD IN PLAYER</button>
          </div>
        </div>

        <div class="project-list" id="workView">
          <div class="section-label">SELECTED PROJECTS:</div>
          <div id="projectRows"></div>
        </div>
      </section>
    </main>

<footer class="player-bar">
  <div class="player-top">
    <div class="player-now-playing" id="nowPlaying">NO TRACK LOADED</div>
    <canvas id="eqVisualizer" class="eq-visualizer" aria-hidden="true"></canvas>

    <div class="scrub-wrap">
      <div class="scrub-rail"></div>
      <input id="progress" type="range" min="0" max="100" step="0.1" value="0">
    </div>
  </div>

  <div class="player-bottom">
    <div class="player-controls">
      <button id="playBtn" class="player-icon" aria-label="Play">
        <span id="playIcon" class="icon-svg">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="8,5 19,12 8,19"></polygon>
          </svg>
        </span>
      </button>

      <button id="nextBtn" class="player-icon" aria-label="Next">
        <span class="icon-svg">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <polygon points="5,5 14,12 5,19"></polygon>
            <polygon points="12,5 21,12 12,19"></polygon>
          </svg>
        </span>
      </button>
    </div>

    <div class="player-times">
      <div class="time" id="currentTime">0:00</div>
      <div class="time" id="duration">0:00</div>
    </div>
  </div>

  <audio id="audio"></audio>
</footer>
  </div>

  <script src="app.js"></script>


<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.location.hash && window.location.hash.indexOf("invite_token") !== -1) {
    window.location.href = "/admin/" + window.location.hash;
  }

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", function(user) {
      if (!user) {
        window.netlifyIdentity.on("login", function() {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>
  
</body>
</html>
